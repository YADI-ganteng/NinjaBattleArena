name: Build APK

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        yes | cmdline-tools/bin/sdkmanager --licenses --sdk_root=$HOME/android-sdk
        cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
    
    - name: Create Android Project
      run: |
        # Project build.gradle
        cat > build.gradle << 'EOF'
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF
        
        # settings.gradle
        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        rootProject.name = "NinjaBattleArena"
        include ':app'
        EOF
        
        # App build.gradle (DENGAN NAMESPACE!)
        mkdir -p app
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.ninja.battle'
            compileSdk 34
            defaultConfig {
                applicationId "com.ninja.battle"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        EOF
        
        # AndroidManifest.xml
        mkdir -p app/src/main/java/com/ninja/battle
        mkdir -p app/src/main/res/values
        
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="Ninja Battle Arena"
                android:allowBackup="true">
                <activity
                    android:name=".MainActivity"
                    android:label="Ninja Battle Arena"
                    android:screenOrientation="landscape"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # MainActivity.java
        cat > app/src/main/java/com/ninja/battle/MainActivity.java << 'EOF'
        package com.ninja.battle;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        import android.widget.LinearLayout;
        import android.graphics.Color;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle saved) {
                super.onCreate(saved);
                LinearLayout layout = new LinearLayout(this);
                layout.setOrientation(LinearLayout.VERTICAL);
                layout.setBackgroundColor(Color.parseColor("#1a1a2e"));
                layout.setGravity(17);
                TextView title = new TextView(this);
                title.setText("🥷 Ninja Battle Arena");
                title.setTextSize(28);
                title.setTextColor(Color.parseColor("#ff6b35"));
                title.setGravity(17);
                layout.addView(title);
                TextView sub = new TextView(this);
                sub.setText("Game Pertarungan Ninja 2D\n\n🟠 Naruto | 🔵 Sasuke\n🩷 Sakura | ⚪ Kakashi");
                sub.setTextSize(14);
                sub.setTextColor(Color.WHITE);
                sub.setGravity(17);
                sub.setPadding(0,30,0,0);
                layout.addView(sub);
                setContentView(layout);
            }
        }
        EOF
        
        # Resources
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Ninja Battle Arena</string>
        </resources>
        EOF
        
        # gradle.properties
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        org.gradle.jvmargs=-Xmx2048m
        EOF
        
        # local.properties
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        echo "Project created!"
    
    - name: Build APK
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        echo "Checking APK:"
        find . -name "*.apk" -type f -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NinjaBattleArena-APK
        path: app/build/outputs/apk/debug/*.apk
