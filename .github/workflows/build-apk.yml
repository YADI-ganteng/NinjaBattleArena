name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        yes | cmdline-tools/bin/sdkmanager --licenses --sdk_root=$HOME/android-sdk
        cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
    
    - name: Create Android Project
      run: |
        # settings.gradle with repositories
        cat > settings.gradle << 'SETTINGS'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "NinjaBattleArena"
        include ':app'
        SETTINGS
        
        # Root build.gradle
        cat > build.gradle << 'ROOT'
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        ROOT
        
        # App build.gradle with repositories
        mkdir -p app
        cat > app/build.gradle << 'APP'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.ninja.battle'
            compileSdk 34
            defaultConfig {
                applicationId "com.ninja.battle"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        repositories {
            google()
            mavenCentral()
        }
        APP
        
        # AndroidManifest
        mkdir -p app/src/main/java/com/ninja/battle
        mkdir -p app/src/main/res/values
        
        cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="Ninja Battle Arena"
                android:allowBackup="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:screenOrientation="landscape">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFEST
        
        # MainActivity
        cat > app/src/main/java/com/ninja/battle/MainActivity.java << 'JAVA'
        package com.ninja.battle;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        import android.widget.LinearLayout;
        import android.graphics.Color;
        import android.view.Gravity;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle saved) {
                super.onCreate(saved);
                LinearLayout l = new LinearLayout(this);
                l.setOrientation(LinearLayout.VERTICAL);
                l.setBackgroundColor(Color.parseColor("#1a1a2e"));
                l.setGravity(Gravity.CENTER);
                TextView t = new TextView(this);
                t.setText("Ninja Battle Arena");
                t.setTextSize(28);
                t.setTextColor(Color.parseColor("#ff6b35"));
                t.setGravity(Gravity.CENTER);
                l.addView(t);
                TextView s = new TextView(this);
                s.setText("\nNaruto | Sasuke | Sakura | Kakashi\n\nGame Pertarungan Ninja 2D\n\nMade in Google Colab");
                s.setTextSize(14);
                s.setTextColor(Color.WHITE);
                s.setGravity(Gravity.CENTER);
                s.setPadding(0,30,0,0);
                l.addView(s);
                setContentView(l);
            }
        }
        JAVA
        
        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Ninja Battle Arena</string>
        </resources>
        XML
        
        # gradle.properties
        cat > gradle.properties << 'PROPS'
        android.useAndroidX=true
        org.gradle.jvmargs=-Xmx2048m
        PROPS
        
        # local.properties
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        echo "Project created!"
    
    - name: Build APK
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        echo "APK location:"
        find . -name "*.apk" -type f
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NinjaBattleArena-APK
        path: app/build/outputs/apk/debug/*.apk
