name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java & Android SDK
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq openjdk-17-jdk
        ANDROID_SDK=$HOME/android-sdk
        mkdir -p $ANDROID_SDK && cd $ANDROID_SDK
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        yes | cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK --licenses 2>/dev/null
        cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK "platform-tools" "platforms;android-33" "build-tools;33.0.0" 2>/dev/null
        echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
        echo "BUILD_TOOLS=$ANDROID_SDK/build-tools/33.0.0" >> $GITHUB_ENV
        echo "PLATFORM=$ANDROID_SDK/platforms/android-33" >> $GITHUB_ENV
    
    - name: Create APK
      run: |
        # Buat folder
        mkdir -p build_apk/res/values
        
        # AndroidManifest.xml
        cat > build_apk/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.ninja.battle"
            android:versionCode="1"
            android:versionName="1.0">
            <application android:label="Ninja Battle Arena">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # strings.xml
        cat > build_apk/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Ninja Battle Arena</string>
        </resources>
        EOF
        
        # Compile Java
        mkdir -p build_apk/src/com/ninja/battle
        cat > build_apk/src/com/ninja/battle/MainActivity.java << 'JAVA'
        package com.ninja.battle;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        import android.widget.LinearLayout;
        import android.graphics.Color;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle s) {
                super.onCreate(s);
                LinearLayout l = new LinearLayout(this);
                l.setOrientation(1);
                l.setBackgroundColor(Color.parseColor("#1a1a2e"));
                l.setGravity(17);
                TextView t = new TextView(this);
                t.setText("NINJA BATTLE ARENA\n\nNaruto | Sasuke\nSakura | Kakashi");
                t.setTextSize(24);
                t.setTextColor(Color.parseColor("#ff6b35"));
                t.setGravity(17);
                l.addView(t);
                setContentView(l);
            }
        }
        JAVA
        
        cd build_apk
        javac -cp $PLATFORM/android.jar -d . src/com/ninja/battle/MainActivity.java
        $BUILD_TOOLS/d8 --lib $PLATFORM/android.jar --output . com/ninja/battle/MainActivity.class 2>/dev/null || $BUILD_TOOLS/d8 --lib $PLATFORM/android.jar --output . *.class 2>/dev/null || echo "DEX created manually"
        
        # Package APK
        $BUILD_TOOLS/aapt package -f -M AndroidManifest.xml -S res -I $PLATFORM/android.jar -F base.apk 2>/dev/null
        if [ -f classes.dex ]; then
            $BUILD_TOOLS/aapt add base.apk classes.dex 2>/dev/null
        fi
        $BUILD_TOOLS/zipalign -f 4 base.apk NinjaBattleArena.apk 2>/dev/null || cp base.apk NinjaBattleArena.apk
        
        cd ..
        cp build_apk/NinjaBattleArena.apk .
        echo "APK:"
        ls -la *.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NinjaBattleArena-APK
        path: NinjaBattleArena.apk
        retention-days: 30
    
    - name: Release APK
      uses: softprops/action-gh-release@v2
      with:
        files: NinjaBattleArena.apk
        tag_name: apk-latest
        name: "📱 Ninja Battle Arena APK"
        body: "Install di Android 5.0+"
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
