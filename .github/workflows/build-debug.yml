name: Build Debug APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0 platform-tools'
    
    - name: Create Project
      run: |
        # Root build.gradle
        cat > build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF
        
        # settings.gradle
        cat > settings.gradle << 'EOF'
        rootProject.name = "NinjaBattle"
        include ':app'
        EOF
        
        # gradle.properties
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        org.gradle.jvmargs=-Xmx2048m
        android.nonTransitiveRClass=true
        EOF
        
        # App build.gradle - DEBUG MODE
        mkdir -p app
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.ninja.battle'
            compileSdk 33
            defaultConfig {
                applicationId "com.ninja.battle"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                debug {
                    debuggable true
                }
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
        }
        EOF
        
        # AndroidManifest
        mkdir -p app/src/main/java/com/ninja/battle
        mkdir -p app/src/main/res/values
        
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="Ninja Battle Arena"
                android:allowBackup="true"
                android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:screenOrientation="landscape">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # MainActivity.java
        cat > app/src/main/java/com/ninja/battle/MainActivity.java << 'EOF'
        package com.ninja.battle;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        import android.widget.LinearLayout;
        import android.graphics.Color;
        import android.view.Gravity;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle s) {
                super.onCreate(s);
                LinearLayout l = new LinearLayout(this);
                l.setOrientation(LinearLayout.VERTICAL);
                l.setBackgroundColor(Color.parseColor("#1a1a2e"));
                l.setGravity(Gravity.CENTER);
                TextView t = new TextView(this);
                t.setText("NINJA BATTLE ARENA\n\n🟠 Naruto  🔵 Sasuke\n🩷 Sakura  ⚪ Kakashi\n\nGame Ninja 2D\n\nMade in Google Colab");
                t.setTextSize(24);
                t.setTextColor(Color.parseColor("#ff6b35"));
                t.setGravity(Gravity.CENTER);
                t.setTypeface(null, android.graphics.Typeface.BOLD);
                l.addView(t);
                setContentView(l);
            }
        }
        EOF
        
        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Ninja Battle Arena</string>
        </resources>
        EOF
    
    - name: Build Debug APK
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -30
        echo ""
        echo "=== MENCARI APK ==="
        find . -name "*.apk" -type f -ls
        echo ""
        echo "=== ISI FOLDER BUILD ==="
        find app/build -type f 2>/dev/null | head -30
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: NinjaBattleArena-DEBUG-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
    
    - name: Upload All APKs
      uses: actions/upload-artifact@v4
      with:
        name: All-APK-Files
        path: "**/*.apk"
        if-no-files-found: warn
