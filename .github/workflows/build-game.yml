name: Build Naruto Senki

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'
    
    - name: Build Game
      run: |
        # settings.gradle
        cat > settings.gradle << 'SET'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        rootProject.name = "NarutoSenki"
        include ':app'
        SET
        
        # Root build.gradle - PLUGINS SYNTAX
        cat > build.gradle << 'ROOT'
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        ROOT
        
        # gradle-wrapper.properties - FORCE GRADLE 8.5
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'WRAP'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAP
        
        # gradle.properties
        cat > gradle.properties << 'PROPS'
        android.useAndroidX=true
        org.gradle.jvmargs=-Xmx2048m
        PROPS
        
        # App build.gradle
        mkdir -p app/src/main/java/com/ninja/senki
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/assets/sprites
        
        cat > app/build.gradle << 'APP'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.ninja.senki'
            compileSdk 33
            defaultConfig {
                applicationId "com.ninja.senki"
                minSdk 21
                targetSdk 33
                versionCode 5
                versionName "5.0"
            }
            buildTypes {
                debug {
                    debuggable true
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
        }
        APP
        
        # AndroidManifest
        cat > app/src/main/AndroidManifest.xml << 'MAN'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Naruto Senki Battle" android:allowBackup="true" android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape" android:configChanges="orientation|screenSize">
                    <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                </activity>
            </application>
        </manifest>
        MAN
        
        # Copy sprites
        cp -r Resources/sprites/* app/src/main/assets/sprites/ 2>/dev/null || echo "No sprites folder"
        
        # FULL GAME CODE
        cat > app/src/main/java/com/ninja/senki/MainActivity.java << 'JAVA'
        package com.ninja.senki;
        import android.app.Activity;
        import android.os.Bundle;
        import android.os.Handler;
        import android.view.*;
        import android.widget.*;
        import android.graphics.*;
        import java.util.*;
        
        public class MainActivity extends Activity {
            private String[] chars = {"Naruto","Sasuke","Sakura","Kakashi","Gaara","Itachi","Jiraiya","Minato"};
            private int[] colors = {0xffff6b00,0xff3333aa,0xffff88aa,0xff666666,0xffcc8844,0xffaa3333,0xffff4444,0xffffdd00};
            private int selected = 0;
            private float pHP=500,pMaxHP=500,pCP=200,pMaxCP=200,eHP=500,eMaxHP=500;
            private int time=99;
            private boolean over=false;
            private Handler h=new Handler();
            private Random r=new Random();
            private ProgressBar pHPBar,eHPBar,pCPBar,eCPBar;
            private TextView timerText,logText,charText;
            private ImageView playerSprite,enemySprite;
            private FrameLayout arena;
            private float pX=50,pY=250;
            
            @Override
            protected void onCreate(Bundle s){
                super.onCreate(s);
                requestWindowFeature(1);
                getWindow().setFlags(1024,1024);
                
                LinearLayout main=new LinearLayout(this);
                main.setOrientation(1);
                main.setBackgroundColor(Color.parseColor("#0a0a1a"));
                
                // Character selector
                LinearLayout sel=new LinearLayout(this);
                sel.setOrientation(0);
                sel.setGravity(17);
                Button prev=new Button(this);
                prev.setText("◀");
                prev.setOnClickListener(v->{selected=(selected-1+chars.length)%chars.length;charText.setText(chars[selected]);});
                sel.addView(prev);
                charText=new TextView(this);
                charText.setText(" "+chars[selected]+" ");
                charText.setTextSize(22);
                charText.setTextColor(Color.WHITE);
                charText.setTypeface(null,Typeface.BOLD);
                sel.addView(charText);
                Button next=new Button(this);
                next.setText("▶");
                next.setOnClickListener(v->{selected=(selected+1)%chars.length;charText.setText(chars[selected]);});
                sel.addView(next);
                main.addView(sel);
                
                // Arena
                arena=new FrameLayout(this);
                arena.setLayoutParams(new LinearLayout.LayoutParams(-1,350));
                arena.setBackgroundColor(Color.parseColor("#1a1a3a"));
                
                playerSprite=new ImageView(this);
                playerSprite.setLayoutParams(new FrameLayout.LayoutParams(70,90));
                playerSprite.setX(pX);
                playerSprite.setY(pY);
                playerSprite.setBackgroundColor(colors[selected]);
                arena.addView(playerSprite);
                
                enemySprite=new ImageView(this);
                enemySprite.setLayoutParams(new FrameLayout.LayoutParams(70,90));
                enemySprite.setX(600);
                enemySprite.setY(180);
                enemySprite.setBackgroundColor(Color.RED);
                arena.addView(enemySprite);
                
                arena.setOnTouchListener((v,e)->{
                    if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){
                        pX=e.getX()-35;
                        pY=e.getY()-45;
                        playerSprite.setX(pX);
                        playerSprite.setY(pY);
                    }
                    return true;
                });
                main.addView(arena);
                
                // HP/CP bars
                pHPBar=new ProgressBar(this,null,android.R.attr.progressBarStyleHorizontal);
                pHPBar.setMax((int)pMaxHP);
                pHPBar.setProgress((int)pHP);
                pHPBar.setProgressTintList(android.content.res.ColorStateList.valueOf(Color.GREEN));
                main.addView(pHPBar);
                
                pCPBar=new ProgressBar(this,null,android.R.attr.progressBarStyleHorizontal);
                pCPBar.setMax((int)pMaxCP);
                pCPBar.setProgress((int)pCP);
                pCPBar.setProgressTintList(android.content.res.ColorStateList.valueOf(Color.BLUE));
                main.addView(pCPBar);
                
                eHPBar=new ProgressBar(this,null,android.R.attr.progressBarStyleHorizontal);
                eHPBar.setMax((int)eMaxHP);
                eHPBar.setProgress((int)eHP);
                eHPBar.setProgressTintList(android.content.res.ColorStateList.valueOf(Color.RED));
                main.addView(eHPBar);
                
                // Timer
                timerText=new TextView(this);
                timerText.setText("⏱ "+time);
                timerText.setTextSize(22);
                timerText.setTextColor(Color.WHITE);
                timerText.setGravity(17);
                main.addView(timerText);
                
                // Log
                logText=new TextView(this);
                logText.setText("Sentuh arena untuk bergerak!");
                logText.setTextSize(13);
                logText.setTextColor(Color.parseColor("#aaaaaa"));
                logText.setGravity(17);
                main.addView(logText);
                
                // Buttons
                LinearLayout btns=new LinearLayout(this);
                btns.setOrientation(0);
                btns.setGravity(17);
                String[]labels={"👊ATK","⚡SK1","💥SK2","🌟ULT","🏃DASH"};
                int[]btnColors={0xffff4444,0xff4488ff,0xff8844ff,0xffffaa00,0xff44ff44};
                for(int i=0;i<labels.length;i++){
                    Button btn=new Button(this);
                    btn.setText(labels[i]);
                    btn.setTextColor(Color.WHITE);
                    btn.setBackgroundColor(btnColors[i]);
                    btn.setTextSize(14);
                    final int idx=i;
                    btn.setOnClickListener(v->{
                        if(!over){
                            float dmg=40+idx*35;
                            eHP-=dmg;
                            if(eHP<0)eHP=0;
                            updateUI();
                            logText.setText("Damage: "+(int)dmg+"  |  Enemy HP: "+(int)eHP);
                            if(eHP<=0){over=true;logText.setText("🎉 YOU WIN! 🎉");}
                        }
                    });
                    btns.addView(btn);
                }
                main.addView(btns);
                
                setContentView(main);
                startTimer();
                startAI();
            }
            
            private void updateUI(){
                pHPBar.setProgress((int)pHP);
                pCPBar.setProgress((int)pCP);
                eHPBar.setProgress((int)eHP);
                pCP+=2;
                if(pCP>pMaxCP)pCP=pMaxCP;
            }
            
            private void startTimer(){
                h.postDelayed(new Runnable(){public void run(){
                    if(!over){
                        time--;
                        timerText.setText("⏱ "+time);
                        if(time<=0){over=true;logText.setText("⏰ TIME UP! "+(pHP>eHP?"YOU WIN!":"YOU LOSE!"));}
                        else h.postDelayed(this,1000);
                    }
                }},1000);
            }
            
            private void startAI(){
                h.postDelayed(new Runnable(){public void run(){
                    if(!over){
                        float dmg=15+r.nextInt(35);
                        pHP-=dmg;
                        if(pHP<0)pHP=0;
                        updateUI();
                        // Enemy move toward player
                        float ex=enemySprite.getX();
                        if(pX>ex)enemySprite.setX(ex+10);
                        else enemySprite.setX(ex-10);
                        if(pHP<=0){over=true;logText.setText("💀 YOU LOSE!");}
                        else h.postDelayed(this,2000);
                    }
                }},2000);
            }
        }
        JAVA
        
        # BUILD
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -30
        echo ""
        echo "=== APK FILES ==="
        find . -name "*.apk" -type f -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoSenki-APK
        path: app/build/outputs/apk/debug/*.apk
