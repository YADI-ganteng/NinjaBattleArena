name: Package Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Package Game
      run: |
        zip -r NinjaBattleArena.zip . -x ".git/*" ".github/*"
        echo "Package created!"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NinjaBattleArena
        path: NinjaBattleArena.zip
