name: Godot Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Package Game
      run: |
        echo "Packaging Ninja Battle Arena (Godot)..."
        zip -r NinjaBattleArena-Godot.zip . -x ".git/*" ".github/*"
        echo "Done!"
        ls -la *.zip
    
    - name: Upload Game Package
      uses: actions/upload-artifact@v4
      with:
        name: NinjaBattleArena-Godot
        path: NinjaBattleArena-Godot.zip
    
    - name: Upload Sprites
      uses: actions/upload-artifact@v4
      with:
        name: Game-Sprites
        path: sprites/
    
    - name: Upload Scripts
      uses: actions/upload-artifact@v4
      with:
        name: Game-Scripts
        path: scripts/
