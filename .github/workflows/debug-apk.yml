name: Build APK Debug

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'
    
    - name: Build Game
      run: |
        # settings.gradle
        cat > settings.gradle << 'SET'
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        rootProject.name = "Game"
        include ':app'
        SET
        
        # Root build.gradle
        cat > build.gradle << 'ROOT'
        plugins { id 'com.android.application' version '8.2.0' apply false }
        ROOT
        
        # gradle-wrapper.properties
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'WRAP'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAP
        
        cat > gradle.properties << 'PROPS'
        android.useAndroidX=true
        org.gradle.jvmargs=-Xmx2048m
        PROPS
        
        # App build.gradle
        mkdir -p app/src/main/java/com/ninja/senki
        mkdir -p app/src/main/res/values
        
        cat > app/build.gradle << 'APP'
        plugins { id 'com.android.application' }
        android {
            namespace 'com.ninja.senki'
            compileSdk 33
            defaultConfig {
                applicationId "com.ninja.senki"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                debug { debuggable true }
            }
        }
        APP
        
        # Simple AndroidManifest
        cat > app/src/main/AndroidManifest.xml << 'MAN'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Ninja Battle">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MAN
        
        # Simple Java
        cat > app/src/main/java/com/ninja/senki/MainActivity.java << 'JAVA'
        package com.ninja.senki;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        import android.graphics.Color;
        import android.view.Gravity;
        public class MainActivity extends Activity {
            protected void onCreate(Bundle s) {
                super.onCreate(s);
                TextView t = new TextView(this);
                t.setText("NINJA BATTLE ARENA\n\nGame Ready!");
                t.setTextSize(28);
                t.setTextColor(Color.parseColor("#ff6b35"));
                t.setGravity(Gravity.CENTER);
                setContentView(t);
            }
        }
        JAVA
        
        cat > app/src/main/res/values/strings.xml << 'STR'
        <?xml version="1.0" encoding="utf-8"?>
        <resources><string name="app_name">Ninja Battle</string></resources>
        STR
        
        # BUILD
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
        
        echo ""
        echo "=== MENCARI APK ==="
        find . -name "*.apk" -type f -ls 2>/dev/null
        echo ""
        echo "=== ISI FOLDER BUILD ==="
        ls -la app/build/ 2>/dev/null
        echo ""
        ls -la app/build/outputs/ 2>/dev/null
        echo ""
        ls -la app/build/outputs/apk/ 2>/dev/null
        echo ""
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Folder debug not found"
        
        # Jika APK tidak ada, cek apakah ada error build
        if [ ! -d "app/build/outputs/apk/debug" ]; then
            echo "Build mungkin gagal. Cek log:"
            ./gradlew assembleDebug --no-daemon --info 2>&1 | grep -i "error\|failed\|BUILD" | tail -20
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK-Found
        path: "**/*.apk"
        if-no-files-found: warn
    
    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs
        path: app/build/
        if-no-files-found: warn
