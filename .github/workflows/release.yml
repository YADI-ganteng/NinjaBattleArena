name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Package
      run: zip -r NinjaBattleArena.zip . -x ".git/*" ".github/*"
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: NinjaBattleArena.zip
        name: Release ${{ github.ref_name }}
        body: |
          ## 🎮 Ninja Battle Arena ${{ github.ref_name }}
          
          Godot game source code + assets!
          
          ### How to Play:
          1. Install Godot Engine
          2. Open project.godot
          3. Press F5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
